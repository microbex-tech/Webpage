<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microbex Agritech LLP - Coming Soon</title>
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1f8f3a, #4ac76d, #e9ffe8);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #222;
            text-align: center;
            padding: 20px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 700px;
            background: rgba(255, 255, 255, 0.85);
            padding: 40px 30px;
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            backdrop-filter: blur(5px);
            padding: 60px 30px 40px;
        }

        h1 {
            font-size: 2.6rem;
            margin-bottom: 15px;
            color: #1f8f3a;
        }

        p {
            font-size: 1.1rem;
            color: #444;
            line-height: 1.6;
        }

        .tagline {
            margin: 20px 0;
            font-weight: 600;
            color: #1f8f3a;
            font-size: 1.2rem;
        }

        button {
            padding: 12px 26px;
            background: #1f8f3a;
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #187631;
            transform: translateY(-2px);
        }

        footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #555;
        }

        .top-logo {
    position: fixed;
    top: 20px;
    left: 30px;
    height: 80px;
    z-index: 1000;
}

@media (max-width: 600px) {
    .top-logo {
        height: 55px;
        top: 15px;
        left: 20px;
    }
}
 

 
    </style>
</head>
<body>

    <a href="/">
    <img src="/assets/images/microbex-logo.png" alt="Microbex Logo" class="top-logo">
</a>
    <div class="container">
        <h1>Something Fresh Is Cooking at Microbex</h1>
        
        <p>
            We’re building a modern platform that blends innovative technology
            with delicious, healthy snacking solutions.
        </p>

        <div class="tagline">Tech-Powered. Taste-Driven.</div>

  <form action="https://formsubmit.co/contact@microbex.in" method="POST" style="margin-top: 20px;">

    <!-- Prevent Spam -->
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_subject" value="New Microbex Website Notification Request">
    <input type="hidden" name="_template" value="table">

    <input 
        type="text" 
        name="name" 
        placeholder="Your Name" 
        required
        style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc;"
    >

    <input 
        type="email" 
        name="email" 
        placeholder="Your Email" 
        required
        style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc;"
    >

    <input 
        type="text" 
        name="phone" 
        placeholder="Phone Number" 
        required
        style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc;"
    >

    <button 
        type="submit"
        style="width: 100%; padding: 14px; background: #1f8f3a; color: white; border: none; border-radius: 30px; font-size: 1rem; cursor: pointer; font-weight: bold;"
    >
        Notify Me When It Goes Live
    </button>
</form>

        <footer>© Microbex Agritech LLP</footer>
    </div>

</body>
</html>
