<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microbex Agritech LLP - Coming Soon</title>
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff8a00, #ffb347, #fff7e6);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #222;
            text-align: center;
            padding: 20px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 700px;
            background: rgba(255, 255, 255, 0.85);
            padding: 40px 30px;
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            backdrop-filter: blur(5px);
        }

        h1 {
            font-size: 2.6rem;
            margin-bottom: 15px;
            color: #ff6a00;
        }

        p {
            font-size: 1.1rem;
            color: #444;
            line-height: 1.6;
        }

        .tagline {
            margin: 20px 0;
            font-weight: 600;
            color: #222;
            font-size: 1.2rem;
        }

        button {
            padding: 12px 26px;
            background: #ff6a00;
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #e45d00;
            transform: translateY(-2px);
        }

        footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Something Fresh Is Cooking at Microbex</h1>
        
        <p>
            We’re building a modern platform that blends innovative technology 
            with delicious, healthy snacking solutions.
        </p>

        <div class="tagline">Tech-Powered. Taste-Driven.</div>

        <button>Notify Me When It Goes Live</button>

        <footer>© Microbex Agritech LLP</footer>
    </div>

</body>
</html>
